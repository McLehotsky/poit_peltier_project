<!DOCTYPE html>
<html>
<head>
    <title>Peltier - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script src="https://cdn.plot.ly/plotly-3.5.1.min.js" charset="utf-8"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="#">Navbar</a>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
            <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
                <li class="nav-item active">
                    <a class="nav-link" href="{{ url_for('index') }}">Dashboard <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('archive') }}">Archive</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-4 bg-slate-200 p-2">
                <div class="d-flex align-items-center justify-content-center mb-3">
                    <button id="connect-btn" class="btn btn-block btn-warning">Connect</button>
                </div>
                <div class="row d-flex justify-content-center">
                    <div class="col">
                        <button id="start-btn" class="btn btn-block bg-green-500">Start</button>
                    </div>
                    <div class="col">
                        <button id="stop-btn" class="btn btn-block bg-red-500">Stop</button>
                    </div>
                </div>
                <p class="mt-3">Mode:</p>
                <select id="mode-select" class="p-1 border border-gray-300 rounded">
                    <option value="manual">Manual</option>
                    <option value="automatic">Automatic</option>
                </select>
                <div>
                    <p class="mt-3">Ovládanie pumpa:</p>
                    <input id="ovladanie-pumpa" type="number" class="p-1 border border-gray-300 rounded"></input>
                </div>
                <div>
                    <p class="mt-3">Ovládanie peltier:</p>
                    <input id="ovladanie-peltier" type="number" class="p-1 border border-gray-300 rounded"></input>
                </div>
                <div>
                    <p class="mt-3">Simulovanie chyby:</p>
                    <div class="flex flex-row justify-between mt-2">
                        <input id="chyba-checkbox" type="checkbox" id="error-simulation" >
                        <input id="chyba-cislo" type="number" class="p-1 border border-gray-300 rounded"></input>
                    </div>
                </div>
                <div>
                    <p class="mt-3">Terminal:</p>
                    <textarea id="terminal" class="terminal" aria-label="Terminal"></textarea>
                </div>
            </div>
            <div class="col-8 bg-slate-100 p-3">
                <div class="row">
                    <div class="col-6">
                        <p class="text-center"> pumpa </p>
                        <div id="pump-graph" class="graph-container shadow-sm"></div>
                    </div>
                    <div class="col-6">
                        <p class="text-center"> peltier </p>
                        <div id="tec-graph" class="graph-container shadow-sm"></div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <p class="text-center"> teplota </p>
                        <div id="temp-graph" class="graph-container shadow-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../static/js/main.js"></script>
</body>
</html>
