<!DOCTYPE html>
<html>
<head>
    <title>Peltier - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script src="https://cdn.plot.ly/plotly-3.5.1.min.js" charset="utf-8"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light navbar-transparency">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="#">Údený peltier</a>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
            <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
                <li class="nav-item active">
                    <a class="nav-link" href="{{ url_for('index') }}">Dashboard <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('archive') }}">Archive</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container my-3">
        <div class="row">
            <!-- ĽAVÝ STĹPEC -->
            <div class="col-4">
                <div class="p-3 rounded h-100 column-transparency">
                    <div class="d-flex align-items-center justify-content-center mb-3">
                        <button id="connect-btn" class="btn btn-block btn-yellow">Pripojiť sa</button>
                    </div>
                    <div class="row d-flex justify-content-center">
                        <div class="col">
                            <button id="start-btn" class="btn btn-block btn-green">Štart</button>
                        </div>
                        <div class="col">
                            <button id="stop-btn" class="btn btn-block bg-red-500">Stop</button>
                        </div>
                    </div>
                    <div id="wrapper-teplota">
                        <p class="mt-3">Žiadaná teplota:</p>
                        <input id="ovladanie-teplota" type="number" min="0" max="30" value="25" class="p-1 border border-gray-300 rounded w-100">
                    </div>
                    <p class="mt-3">Mode:</p>
                    <select id="mode-select" class="p-1 border border-gray-300 rounded w-100">
                        <option value="1">Regulácia TEC</option>
                        <option value="2">Regulácia pumpa</option>
                        <option value="3">Kaskádová regulácia</option>
                    </select>
                    <div id="wrapper-pumpa" style="display: none;">
                        <p class="mt-3">Ovládanie pumpa:</p>
                        <input id="ovladanie-pumpa" type="number" min="0" max="255" value="150" class="p-1 border border-gray-300 rounded w-100">
                    </div>
                    <div id="wrapper-peltier" style="display: none;">
                        <p class="mt-3">Ovládanie peltier:</p>
                        <input id="ovladanie-peltier" type="number" min="0" max="255" value="150" class="p-1 border border-gray-300 rounded w-100">
                    </div>
                    <div>
                        <p class="mt-3 mb-1">Simulovanie chyby:</p>
                        <div class="d-flex align-items-center w-100">
                            <input id="chyba-cislo" type="number" class="p-1 border border-gray-300 rounded flex-grow-1 mr-3" style="min-width: 50px;">
                            <div class="checkbox-wrapper-18" style="flex-shrink: 0;">
                              <div class="round">
                                <input id="chyba-checkbox" type="checkbox" value="0" />
                                <label for="chyba-checkbox"></label>
                              </div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p class="mt-3">Terminal:</p>
                        <textarea id="terminal" class="terminal w-100 rounded" rows="10" aria-label="Terminal"></textarea>
                    </div>
                </div>
            </div>
            <!-- PRAVÝ STĹPEC -->
            <div class="col-8">
                <div class="p-3 rounded h-100 column-transparency">
                    <div class="row">
                        <div class="col-6">
                            <h5 class="text-center"> Pumpa </h5>
                            <div id="pump-graph" class="graph-container shadow-sm"></div>
                        </div>
                        <div class="col-6">
                            <h5 class="text-center"> Peltier </h5>
                            <div id="tec-graph" class="graph-container shadow-sm"></div>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-12">
                            <h5 class="text-center"> Teplota </h5>
                            <div id="temp-graph" class="graph-container shadow-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap Modálne Okno -->
    <div class="modal fade" id="bootstrapModal" tabindex="-1" aria-labelledby="bootstrapModalLabel" aria-hidden="true">
      <div class="modal-dialog rounded">
        <div class="modal-content">
          <div id="modalHeader" class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="bootstrapModalLabel">Upozornenie</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="bootstrapModalBody">
            Tu sa zobrazí text správy.
          </div>
          <div class="modal-footer">
            <button type="button" id="modalBtn" class="btn btn-secondary" data-bs-dismiss="modal">Zatvoriť</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="navbar-transparency text-black text-center text-lg-start">
        <!-- Copyright -->
        <div class="footer-dimmed text-center p-3">
            © 2026 POIT
        </div>
    </footer>

    <script src="../static/js/main.js"></script>
</body>
</html>
