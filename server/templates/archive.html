<!DOCTYPE html>
<html>
<head>
    <title>Peltier - Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
    <script src="https://cdn.plot.ly/plotly-3.5.1.min.js" charset="utf-8"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="#">Údený peltier</a>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
            <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}">Dashboard</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" href="{{ url_for('archive') }}">Archive <span class="sr-only">(current)</span></a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="bg-slate-200 p-2">
            <div class="row">
                <div class="col">
                <p class="mt-3 mb-1">Výber zdroja:</p>
                <select id="mode-select" class="p-1 border border-gray-300 rounded w-100">
                    <option value="databaza">Databáza</option>
                    <option value="subor">Súbor</option>
                </select>
            </div>
            <div class="col">
                <p class="mt-3 mb-1">Index záznamu:</p>
                <!-- Zmazané </input> a pridané w-100 -->
                <input id="index-zaznamu" type="number" value="1" class="p-1 border border-gray-300 rounded w-100">
            </div>
            <div class="col d-flex align-items-end">
                <!-- Tlačidlo, ktoré spúšťa JS kód vyššie -->
                <button id="show-btn" class="btn btn-primary w-100 mb-1">Zobraziť</button>
            </div>
            </div>
        </div>
        <div id="graphs-wrapper" class="bg-slate-200 p-2" style="display: none;">
            <div class="row mt-4">
                <div class="col-6">
                    <p class="text-center">Pumpa</p>
                    <div id="pump-graph" class="graph-container shadow-sm"></div>
                </div>
                <div class="col-6">
                    <p class="text-center">Peltier</p>
                    <div id="tec-graph" class="graph-container shadow-sm"></div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12">
                    <p class="text-center">Teplota</p>
                    <div id="temp-graph" class="graph-container shadow-sm"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap Modálne Okno -->
    <div class="modal fade" id="bootstrapModal" tabindex="-1" aria-labelledby="bootstrapModalLabel" aria-hidden="true">
      <div class="modal-dialog rounded">
        <div class="modal-content">
          <div id="modalHeader" class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="bootstrapModalLabel">Upozornenie</h5>
            <!-- Krížik upravený pre Bootstrap 5 (btn-close-white zabezpečí, že bude biely) -->
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="bootstrapModalBody">
            Tu sa zobrazí text správy.
          </div>
          <div class="modal-footer">
            <button type="button" id="modalBtn" class="btn btn-secondary" data-bs-dismiss="modal">Zatvoriť</button>
          </div>
        </div>
      </div>
    </div>
    <script src="../static/js/archive.js"></script>
</body>
</html>
